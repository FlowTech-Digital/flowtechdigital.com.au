    .hero{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--ft-obsidian) 0%,var(--ft-indigo) 100%);padding-top:3rem}.hero-content{text-align:center;padding:2rem}

    h1{font-family:var(--ft-font-heading);font-size:clamp(1.4rem,3.2vw,2.2rem);font-weight:700;color:var(--ft-mist);margin-bottom:1rem;line-height:1.3}

    .cta-button{display:inline-block;background:var(--ft-azure);color:var(--ft-white);padding:1rem 2rem;border-radius:8px;text-decoration:none;font-weight:600;font-size:1.1rem;transition:all 0.3s}.cta-button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(30,120,255,0.3)}
    .err-actions{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:1.25rem}
    .secondary-link{color:var(--ft-cyan);text-decoration:none;font-weight:600;font-size:1.05rem;transition:color 0.3s}.secondary-link:hover{color:var(--ft-azure)}
    footer{background:rgba(11,17,20,0.95);padding:2rem;text-align:center;border-top:1px solid rgba(30,120,255,0.1)}footer p{font-size:0.9rem;color:#6b7280;margin-bottom:0.5rem}footer a{color:var(--ft-azure);text-decoration:none}footer a:hover{opacity:0.8}
    .footer-inner{max-width:1200px;margin:0 auto;padding:0 20px}.footer-brand{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:1rem}.footer-brand img{height:42px;width:auto}.footer-brand .fwm{font-family:'Michroma',sans-serif;font-size:.9rem;letter-spacing:.12em;color:var(--ft-mist);white-space:nowrap}.footer-brand .fwm .wm-suffix{color:var(--ft-azure)}
    .nav-toggle{display:none;background:none;border:none;cursor:pointer;width:28px;height:20px;position:relative;flex:none;padding:0}.nav-toggle span,.nav-toggle span::before,.nav-toggle span::after{display:block;width:100%;height:1.5px;background:var(--ft-mist);position:absolute;transition:transform .3s,opacity .3s;left:0}.nav-toggle span{top:50%;transform:translateY(-50%)}.nav-toggle span::before{content:"";top:-7px;position:absolute}.nav-toggle span::after{content:"";top:7px;position:absolute}.nav-toggle.open span{background:transparent}.nav-toggle.open span::before{top:0;transform:rotate(45deg)}.nav-toggle.open span::after{top:0;transform:rotate(-45deg)}
    @media(max-width:860px){.nav-toggle{display:block}.nav-content{flex-direction:row;gap:0}.nav-links{display:none;position:fixed;top:76px;left:0;right:0;bottom:0;background:rgba(11,17,20,.96);backdrop-filter:blur(16px);flex-direction:column;align-items:center;justify-content:center;gap:36px;z-index:49;list-style:none}.nav-links.open{display:flex}.nav-links a{font-size:18px;color:var(--ft-mist)}.nav-logo img.nav-mark{height:32px}.nav-wm{font-size:.82rem;letter-spacing:.09em}}

    body{animation:pageIn .5s ease}@keyframes pageIn{from{opacity:0}to{opacity:1}}

<body>

      <ul class="nav-links">
        <li><a href="/services/">Services</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false"><span></span></button>
    </div>
  </nav>
  <main class="hero">
    <div class="hero-content">
      <div class="err-code">404</div>
      <h1>404 &mdash; Page not found</h1>
      <p>That page doesn't exist or has moved.</p>
      <div class="err-actions">
        <a href="/" class="cta-button">Back to home</a>

    </div>
  </footer>
<script>
const toggle=document.querySelector('.nav-toggle');
const mlinks=document.querySelector('.nav-links');
if(toggle){
  toggle.addEventListener('click',()=>{
    const open=toggle.classList.toggle('open');
    mlinks.classList.toggle('open');
    toggle.setAttribute('aria-expanded',open);
    document.body.style.overflow=open?'hidden':'';
  });
  mlinks.querySelectorAll('a').forEach(a=>{
    a.addEventListener('click',()=>{
      toggle.classList.remove('open');mlinks.classList.remove('open');
      toggle.setAttribute('aria-expanded','false');
      document.body.style.overflow='';
    });
  });
}
</script>
</body>
